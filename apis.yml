aid: chicos-fas
name: Chico's FAS
kind: company
description: >-
  Chico's FAS, Inc. is an American women's specialty retailer headquartered
  in Fort Myers, Florida, operating and franchising stores and websites
  under the Chico's, White House Black Market, and Soma brands. The company
  is a leading omni-channel specialty retailer of private branded
  sophisticated, casual-to-dressy clothing, intimates, sleepwear, and
  related accessories, with more than 1,400 retail and outlet stores in
  the United States and a substantial e-commerce footprint. Chico's FAS
  is part of the KnitWell Group portfolio. Chico's FAS does not currently
  publish a public consumer-facing developer API; partner integrations
  are coordinated through corporate channels and the loyalty/credit card
  partnership with Synchrony and Mastercard.
